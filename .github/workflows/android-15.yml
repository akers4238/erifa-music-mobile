name: Android 15 Build

on:
  push:
    branches:
      - yotube
  workflow_dispatch:

permissions:
  contents: read

env:
  ANDROID_COMPILE_API_LEVEL: 35
  ANDROID_TARGET_API_LEVEL: 29
  ANDROID_BUILD_TOOLS: 35.0.0
  ANDROID_ABI: arm64-v8a
  DISABLE_SVG: 1

jobs:
  build:
    name: Build Android 15 APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup project environment
        uses: ./.github/actions/setup

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 15 SDK
        shell: bash
        run: |
          sdkmanager "platform-tools" "platforms;android-${ANDROID_COMPILE_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x android/gradlew

      - name: Build release APK
        shell: bash
        env:
          KEYSTORE_STORE_FILE_BASE64: ${{ secrets.KEYSTORE_STORE_FILE_BASE64 }}
          KEYSTORE_STORE_FILE: ${{ secrets.KEYSTORE_STORE_FILE }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          cd android

          if [ -n "${KEYSTORE_STORE_FILE_BASE64}" ] && [ -n "${KEYSTORE_STORE_FILE}" ]; then
            echo "${KEYSTORE_STORE_FILE_BASE64}" | base64 --decode > "app/${KEYSTORE_STORE_FILE}"
            ./gradlew --no-daemon --stacktrace --max-workers=1 assembleRelease \
              -PandroidCompileSdkVersion="${ANDROID_COMPILE_API_LEVEL}" \
              -PandroidTargetSdkVersion="${ANDROID_TARGET_API_LEVEL}" \
              -PandroidBuildToolsVersion="${ANDROID_BUILD_TOOLS}" \
              -PreactNativeArchitectures="${ANDROID_ABI}" \
              -PandroidUniversalApk=false \
              -PMYAPP_UPLOAD_STORE_FILE="${KEYSTORE_STORE_FILE}" \
              -PMYAPP_UPLOAD_KEY_ALIAS="${KEYSTORE_KEY_ALIAS}" \
              -PMYAPP_UPLOAD_STORE_PASSWORD="${KEYSTORE_PASSWORD}" \
              -PMYAPP_UPLOAD_KEY_PASSWORD="${KEYSTORE_KEY_PASSWORD}"
            rm -f "app/${KEYSTORE_STORE_FILE}"
          else
            ./gradlew --no-daemon --stacktrace --max-workers=1 assembleRelease \
              -PandroidCompileSdkVersion="${ANDROID_COMPILE_API_LEVEL}" \
              -PandroidTargetSdkVersion="${ANDROID_TARGET_API_LEVEL}" \
              -PandroidBuildToolsVersion="${ANDROID_BUILD_TOOLS}" \
              -PreactNativeArchitectures="${ANDROID_ABI}" \
              -PandroidUniversalApk=false \
              -PMYAPP_UPLOAD_STORE_FILE="debug.keystore" \
              -PMYAPP_UPLOAD_KEY_ALIAS="androiddebugkey" \
              -PMYAPP_UPLOAD_STORE_PASSWORD="android" \
              -PMYAPP_UPLOAD_KEY_PASSWORD="android"
          fi

      - name: Show build crash diagnostics
        if: failure()
        shell: bash
        run: |
          free -h || true
          find android -maxdepth 2 -name "hs_err_pid*.log" -print -exec sed -n '1,220p' {} \; || true

      - name: Show APK checksums
        shell: bash
        run: |
          cd android/app/build/outputs/apk/release
          md5sum *.apk | tee MD5SUMS.txt

      - name: Upload APKs to WebDAV
        shell: bash
        env:
          WEBDAV_URL: ${{ secrets.WEBDAV_URL || 'https://webdav.123pan.cn/webdav' }}
          WEBDAV_USERNAME: ${{ secrets.WEBDAV_USERNAME || '17644458691' }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD || 'trrsv0pj' }}
        run: |
          if [ -z "${WEBDAV_URL}" ] || [ -z "${WEBDAV_USERNAME}" ] || [ -z "${WEBDAV_PASSWORD}" ]; then
            echo "WebDAV secrets are not configured, skip upload."
            exit 0
          fi

          BASE_URL="${WEBDAV_URL%/}"
          REMOTE_DIR="lx-music-mobile/${GITHUB_REF_NAME}/${GITHUB_RUN_NUMBER}"

          echo "Checking WebDAV login..."
          curl --fail --silent --show-error --anyauth --user "${WEBDAV_USERNAME}:${WEBDAV_PASSWORD}" --request PROPFIND --header "Depth: 0" "${BASE_URL}/" > /dev/null

          mkcol() {
            local url="$1"
            local status
            status="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" --anyauth --user "${WEBDAV_USERNAME}:${WEBDAV_PASSWORD}" --request MKCOL "${url}")"
            if [ "${status}" != "201" ] && [ "${status}" != "405" ]; then
              echo "Failed to create WebDAV directory ${url}, status: ${status}"
              exit 1
            fi
          }

          mkcol "${BASE_URL}/lx-music-mobile"
          mkcol "${BASE_URL}/lx-music-mobile/${GITHUB_REF_NAME}"
          mkcol "${BASE_URL}/${REMOTE_DIR}"

          upload_file() {
            local file="$1"
            local attempt=1
            local max_attempts=5

            while true; do
              echo "Uploading ${file} to WebDAV... attempt ${attempt}/${max_attempts}"
              if curl --fail --silent --show-error --connect-timeout 30 --max-time 180 --anyauth --user "${WEBDAV_USERNAME}:${WEBDAV_PASSWORD}" --upload-file "${file}" "${BASE_URL}/${REMOTE_DIR}/${file}"; then
                echo "Uploaded ${file}."
                return 0
              fi

              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "Failed to upload ${file} after ${max_attempts} attempts."
                return 1
              fi

              echo "Upload ${file} failed or timed out after 3 minutes, retrying in 10 seconds..."
              attempt=$((attempt + 1))
              sleep 10
            done
          }

          cd android/app/build/outputs/apk/release
          for file in *.apk MD5SUMS.txt; do
            upload_file "${file}"
          done
