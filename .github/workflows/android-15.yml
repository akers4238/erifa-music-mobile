name: Android 15 Build

on:
  push:
    branches:
      - yotube
  workflow_dispatch:

permissions:
  contents: write

env:
  ANDROID_COMPILE_API_LEVEL: 35
  ANDROID_TARGET_API_LEVEL: 29
  ANDROID_BUILD_TOOLS: 35.0.0
  ANDROID_ABI: arm64-v8a
  DISABLE_SVG: 1

jobs:
  build:
    name: Build Android 15 APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup project environment
        uses: ./.github/actions/setup

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 15 SDK
        shell: bash
        run: |
          sdkmanager "platform-tools" "platforms;android-${ANDROID_COMPILE_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x android/gradlew

      - name: Build release APK
        shell: bash
        env:
          KEYSTORE_STORE_FILE_BASE64: ${{ secrets.KEYSTORE_STORE_FILE_BASE64 }}
          KEYSTORE_STORE_FILE: ${{ secrets.KEYSTORE_STORE_FILE }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          cd android

          if [ -n "${KEYSTORE_STORE_FILE_BASE64}" ] && [ -n "${KEYSTORE_STORE_FILE}" ]; then
            echo "${KEYSTORE_STORE_FILE_BASE64}" | base64 --decode > "app/${KEYSTORE_STORE_FILE}"
            ./gradlew --no-daemon --stacktrace --max-workers=1 assembleRelease \
              -PandroidCompileSdkVersion="${ANDROID_COMPILE_API_LEVEL}" \
              -PandroidTargetSdkVersion="${ANDROID_TARGET_API_LEVEL}" \
              -PandroidBuildToolsVersion="${ANDROID_BUILD_TOOLS}" \
              -PreactNativeArchitectures="${ANDROID_ABI}" \
              -PandroidUniversalApk=false \
              -PMYAPP_UPLOAD_STORE_FILE="${KEYSTORE_STORE_FILE}" \
              -PMYAPP_UPLOAD_KEY_ALIAS="${KEYSTORE_KEY_ALIAS}" \
              -PMYAPP_UPLOAD_STORE_PASSWORD="${KEYSTORE_PASSWORD}" \
              -PMYAPP_UPLOAD_KEY_PASSWORD="${KEYSTORE_KEY_PASSWORD}"
            rm -f "app/${KEYSTORE_STORE_FILE}"
          else
            ./gradlew --no-daemon --stacktrace --max-workers=1 assembleRelease \
              -PandroidCompileSdkVersion="${ANDROID_COMPILE_API_LEVEL}" \
              -PandroidTargetSdkVersion="${ANDROID_TARGET_API_LEVEL}" \
              -PandroidBuildToolsVersion="${ANDROID_BUILD_TOOLS}" \
              -PreactNativeArchitectures="${ANDROID_ABI}" \
              -PandroidUniversalApk=false \
              -PMYAPP_UPLOAD_STORE_FILE="debug.keystore" \
              -PMYAPP_UPLOAD_KEY_ALIAS="androiddebugkey" \
              -PMYAPP_UPLOAD_STORE_PASSWORD="android" \
              -PMYAPP_UPLOAD_KEY_PASSWORD="android"
          fi

      - name: Show build crash diagnostics
        if: failure()
        shell: bash
        run: |
          free -h || true
          find android -maxdepth 2 -name "hs_err_pid*.log" -print -exec sed -n '1,220p' {} \; || true

      - name: Show APK checksums
        shell: bash
        run: |
          cd android/app/build/outputs/apk/release
          md5sum *.apk | tee MD5SUMS.txt

      - name: Upload APKs to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd android/app/build/outputs/apk/release
          tag="android-15-${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          title="Android 15 ${GITHUB_REF_NAME} #${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          gh release create "${tag}" ./*.apk ./MD5SUMS.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${title}" \
            --notes "Android 15 APK build from ${GITHUB_REF_NAME} at ${GITHUB_SHA}." \
            --prerelease
